version: '3.9'

x-common-variables: &common-variables
  PUID: 1000
  PGID: 1000
  TZ: Etc/UTC

services:
  pihole:
    image: pihole/pihole:latest
    environment:
      <<: *common-variables
      WEBPASSWORD: ${PIHOLE_PASSWORD}
      MOZILLA_CANARY: true
    networks:
      - infra-services
    ports:
      - 192.168.1.151:53:53/tcp
      - 192.168.1.151:53:53/udp
      - 8600:80
    volumes:
      - pihole_config:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  cgit:
    image: clearlinux/cgit:latest
    networks:
      - infra-services
    ports:
      - 9100:80
    volumes:
      - C:\Users\yohnt\github:/var/www/cgit
    restart: unless-stopped

  npm-local:
    image: jc21/nginx-proxy-manager:latest
    networks:
      - infra-services
      - media-management
    ports:
      - 192.168.1.151:80:80
      - 192.168.1.151:443:443
      - 192.168.1.151:81:81
    volumes:
      - npm_local_data:/data
      - npm_local_ssl:/etc/letsencrypt

volumes: 
  pihole_config:
  pihole_dnsmasq:
  gitlab_runner_conf:
  npm_local_data:
  npm_local_ssl:

networks:
  infra-services:
    name: infra-services
  media-management:
    name: media-management
    external: true
  backend:
    name: backend
